<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Analyse-Prompt für Schweizer Gartenbau- und Landschaftsbauverträge."
    />
    <title>Analyse-Prompt für Schweizer Gartenbau- und Landschaftsbauverträge.</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="Analyse-Prompt für Schweizer Gartenbau- und Landschaftsbauverträge">
        <div class="panel input-panel">
          <header class="panel-header">
            <div class="brand-row">
              <div class="brand-logo-wrap">
                <img class="brand-logo" src="./bgch.png" alt="B&G Schweiz" />
              </div>
              <p class="eyebrow">Schweiz - Gartenbau - Landschaftsbau</p>
            </div>
            <p>
              Pruefe Schweizer Gartenbau- und Landschaftsbauvertraege aus
              Unternehmersicht: Risiken, Klauseln, Fragen und Bericht.
            </p>
          </header>

          <form id="promptForm" class="form-grid">
            <label>
              Projekt / Objekt
              <input
                id="projectName"
                type="text"
                placeholder="z.B. Umgestaltung Privatgarten Meilen"
              />
            </label>

            <input id="role" type="hidden" value="unternehmer" />

            <fieldset>
              <legend>Arbeiten</legend>
              <div class="chip-grid" id="workTypes">
                <label><input type="checkbox" data-work-key="earthworks" value="Erdarbeiten" checked /> Erdarbeiten</label>
                <label><input type="checkbox" data-work-key="paving" value="Belagsarbeiten" checked /> Belaege</label>
                <label><input type="checkbox" data-work-key="walls" value="Mauern und Einfassungen" checked /> Mauern</label>
                <label><input type="checkbox" data-work-key="drainage" value="Entwaesserung und Drainage" checked /> Entwaesserung</label>
                <label><input type="checkbox" data-work-key="planting" value="Bepflanzung" checked /> Bepflanzung</label>
                <label><input type="checkbox" data-work-key="lawn" value="Rasen und Begruenung" checked /> Rasen</label>
                <label><input type="checkbox" data-work-key="irrigation" value="Bewaesserung" /> Bewaesserung</label>
                <label><input type="checkbox" data-work-key="lighting" value="Beleuchtung" /> Beleuchtung</label>
                <label><input type="checkbox" data-work-key="maintenance" value="Pflegeleistungen" /> Pflege</label>
              </div>
            </fieldset>

            <fieldset>
              <legend>Normen & Schwerpunkte</legend>
              <div class="switch-list">
                <label><input id="sia118" type="checkbox" checked /> SIA 118 beruecksichtigen, falls vereinbart</label>
                <label><input id="siaGaLa" type="checkbox" checked /> Garten- und landschaftsbauspezifische Normen pruefen</label>
                <label><input id="anwuchs" type="checkbox" checked /> Anwuchs- und Pflegegarantie vertiefen</label>
                <label><input id="neighbors" type="checkbox" checked /> SIA-Nachweise, Rapporte und Abnahmeunterlagen pruefen</label>
              </div>
            </fieldset>

            <label>
              Besondere Risiken oder Hinweise
              <textarea
                id="specialRisks"
                rows="5"
                placeholder="z.B. Hanglage, alte Leitungen, bestehende Natursteinmauer, enger Zugang, Etappierung..."
              ></textarea>
            </label>

            <label>
              Vertrag als PDF hochladen
              <input id="pdfFile" type="file" accept="application/pdf,.pdf" />
              <span id="pdfStatus" class="field-status" role="status" aria-live="polite"></span>
            </label>

            <label>
              Vertragstext
              <textarea
                id="contractText"
                rows="8"
                placeholder="Hier den Werkvertrag oder die Offerte einfuegen..."
              ></textarea>
            </label>
          </form>
        </div>

        <aside class="panel output-panel">
          <div class="toolbar">
            <div>
              <p class="eyebrow">Unternehmer-Cockpit</p>
              <h2>Analysezentrum</h2>
            </div>
            <div class="action-bar">
              <button id="analyzeButton" type="button" aria-label="Analyse starten" title="Analyse starten">
                Analyse starten
              </button>
              <button id="synthesizeButton" class="secondary-button" type="button" aria-label="Synthese erstellen" title="Synthese erstellen">
                Synthese
              </button>
              <button id="copyButton" class="ghost-button" type="button" aria-label="Prompt kopieren" title="Prompt kopieren">
                Kopieren
              </button>
            </div>
          </div>
          <section class="tabs" aria-label="Arbeitsbereich Vertragsanalyse">
            <div class="tab-list" role="tablist" aria-label="Ansichten">
              <button id="tab-overview" class="tab-button is-active" type="button" role="tab" aria-selected="true" aria-controls="panel-overview" data-tab="overview">
                Cockpit
              </button>
              <button id="tab-risks" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="panel-risks" data-tab="risks">
                Risiken
              </button>
              <button id="tab-clauses" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="panel-clauses" data-tab="clauses">
                Klauseln
              </button>
              <button id="tab-questions" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="panel-questions" data-tab="questions">
                Fragen
              </button>
              <button id="tab-report" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="panel-report" data-tab="report">
                Bericht
              </button>
              <button id="tab-synthesis" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="panel-synthesis" data-tab="synthesis">
                Synthese
              </button>
              <button id="tab-prompt" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="panel-prompt" data-tab="prompt">
                Prompt
              </button>
            </div>

            <div id="panel-overview" class="tab-panel is-active cockpit-view" role="tabpanel" aria-labelledby="tab-overview"></div>
            <div id="panel-risks" class="tab-panel cockpit-view" role="tabpanel" aria-labelledby="tab-risks" hidden>
              <div id="riskOutput"></div>
            </div>
            <div id="panel-clauses" class="tab-panel cockpit-view" role="tabpanel" aria-labelledby="tab-clauses" hidden>
              <div id="clauseOutput"></div>
            </div>
            <div id="panel-questions" class="tab-panel cockpit-view" role="tabpanel" aria-labelledby="tab-questions" hidden>
              <div id="questionOutput"></div>
            </div>
            <div id="panel-report" class="tab-panel" role="tabpanel" aria-labelledby="tab-report" hidden>
              <textarea id="reportOutput" spellcheck="false" readonly></textarea>
            </div>
            <div id="panel-synthesis" class="tab-panel" role="tabpanel" aria-labelledby="tab-synthesis" hidden>
              <textarea
                id="synthesisOutput"
                spellcheck="false"
                placeholder="Die Synthese erscheint hier nach der Detailanalyse..."
              ></textarea>
            </div>
            <div id="panel-prompt" class="tab-panel" role="tabpanel" aria-labelledby="tab-prompt" hidden>
              <textarea id="promptOutput" spellcheck="false"></textarea>
            </div>
          </section>
          <section class="analysis-box" aria-label="Analyse Ergebnis">
            <div class="analysis-header">
              <div>
                <p class="eyebrow">KI-Analyse</p>
                <span id="analysisStatus" role="status" aria-live="polite"></span>
              </div>
              <button
                id="exportPdfButton"
                class="secondary-button"
                type="button"
                aria-label="Analyse als PDF speichern"
                title="Analyse als PDF speichern"
              >
                PDF speichern
              </button>
            </div>
            <textarea
              id="analysisOutput"
              spellcheck="false"
              placeholder="Die Analyse erscheint hier nach dem Start..."
            ></textarea>
          </section>
          <div class="status-row">
            <span id="copyStatus" role="status" aria-live="polite"></span>
            <span id="charCount"></span>
          </div>
        </aside>
      </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
